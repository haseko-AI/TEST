<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SVG→PNG変換ツール｜AI Director</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--blue-deep:#0a2d6e;--accent:#c8a84b;--white:#fff;--gray:#f4f6fb;--border:#d0d9ee;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--gray);min-height:100vh;}
  .header{background:linear-gradient(135deg,#0a2d6e,#3a7bd5);padding:24px 28px;position:relative;overflow:hidden;}
  .header::after{content:'AI';position:absolute;top:-18px;right:-20px;font-family:Georgia,serif;font-size:100px;font-weight:700;color:rgba(255,255,255,0.07);}
  .header-label{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
  .header-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--white);}
  .container{max-width:680px;margin:0 auto;padding:24px 16px 60px;}
  .card{background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:20px;overflow:hidden;box-shadow:0 2px 12px rgba(10,45,110,0.07);}
  .card-title{background:#e8f0fb;border-bottom:1px solid var(--border);padding:12px 20px;font-size:12px;font-weight:700;color:var(--blue-deep);letter-spacing:0.5px;}
  .card-body{padding:20px;}
  .preview-wrap{border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
  .preview-label{background:#e8ecf0;padding:6px 12px;font-size:11px;color:#5a6a8a;}
  #svg-preview{display:block;width:100%;}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a4fa8,#3a7bd5);color:#fff;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(26,79,168,0.3);}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,79,168,0.4);}
  .btn-sub{width:100%;padding:11px;background:#fff;color:var(--blue-deep);border:1.5px solid var(--border);border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:10px;}
  .btn-sub:hover{border-color:#1a4fa8;background:#e8f0fb;}
  .info{font-size:11px;color:#5a6a8a;margin-top:8px;text-align:center;}
  #download-link{display:none;}
  canvas{display:none;}
  .footer{text-align:center;font-size:11px;color:#8a9ab8;padding:16px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-label">AI Director System</div>
  <div class="header-title">SVG → PNG 変換ツール</div>
</div>
<div class="container">

  <div class="card">
    <div class="card-title">ヘッダープレビュー（600×150px）</div>
    <div class="card-body">
      <div class="preview-wrap">
        <div class="preview-label">メールヘッダー画像</div>
        <svg id="svg-preview" xmlns="http://www.w3.org/2000/svg" width="600" height="150" viewBox="0 0 600 150">
          <defs>
            <radialGradient id="mg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#0a2d6e" stop-opacity="0"/>
              <stop offset="65%" stop-color="#1e3f8a" stop-opacity="0.43"/>
              <stop offset="100%" stop-color="#3060a8" stop-opacity="0.52"/>
            </radialGradient>
            <clipPath id="hc"><rect width="600" height="150"/></clipPath>
          </defs>
          <rect width="600" height="150" fill="#0a2d6e"/>
          <ellipse cx="568" cy="10" rx="135" ry="68" fill="url(#mg)" clip-path="url(#hc)"/>
          <text x="548" y="62" font-family="Georgia,serif" font-size="44" font-weight="bold" fill="rgba(255,255,255,0.22)" clip-path="url(#hc)">AI</text>
          <text x="24" y="56" font-family="Arial,sans-serif" font-size="10" fill="#c8a84b" letter-spacing="3">AI DIRECTOR SYSTEM</text>
          <text x="24" y="84" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#ffffff">サンプルタイトル</text>
          <rect y="132" width="600" height="2" fill="#c8a84b"/>
          <text x="24" y="147" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">noreply@aitech-jp.com | 自動送信システム</text>
        </svg>
      </div>
      <button class="btn" onclick="convertToPng()">⬇ PNGとしてダウンロード</button>
      <p class="info">ダウンロードしたPNGをXREAの public_html/img/ フォルダにアップロードしてください</p>
      <canvas id="canvas" width="600" height="150"></canvas>
      <a id="download-link" download="ai-director-header.png">ダウンロード</a>
    </div>
  </div>

  <div class="card">
    <div class="card-title">アップロード後のURL確認</div>
    <div class="card-body">
      <p style="font-size:13px;color:#1a2540;line-height:1.8;">
        XREAにアップロード後、このURLで画像が確認できます：<br>
        <code style="background:#e8f0fb;padding:4px 8px;border-radius:4px;font-size:12px;color:#0a2d6e;">
          https://aitech-jp.com/img/ai-director-header.png
        </code>
      </p>
    </div>
  </div>

</div>
<div class="footer">✦ Powered by Claude with AI Director ✦</div>

<script>
function convertToPng() {
  const svg = document.getElementById('svg-preview');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const svgData = new XMLSerializer().serializeToString(svg);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function() {
    ctx.clearRect(0, 0, 600, 150);
    ctx.drawImage(img, 0, 0, 600, 150);
    URL.revokeObjectURL(url);
    const pngUrl = canvas.toDataURL('image/png');
    const link = document.getElementById('download-link');
    link.href = pngUrl;
    link.click();
  };
  img.src = url;
}
</script>
</body>
</html>
